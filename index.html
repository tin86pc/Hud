<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS HUD - lật gương</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', 'Impact', 'Segoe UI', sans-serif;
            transition: background 0.3s ease;
        }

        body.hud-mode {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(2px);
        }

        body.hud-mode .hud-container {
            background: transparent;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        /* LUÔN LUÔN lật số theo trục X màn hình (bất kể chế độ HUD) */
        .speed-number {
            font-size: min(50vw, 420px);
            font-weight: 900;
            color: #f0fcff;
            text-shadow: 0 0 15px #3ab4ff, 0 0 30px #0077ff;
            line-height: 1;
            letter-spacing: 4px;
            transition: text-shadow 0.2s;
            font-family: 'Arial Black', 'Impact', 'Franklin Gothic Heavy', sans-serif;
            white-space: nowrap;
            text-align: center;
            display: inline-block;
            /* Lật ngang vĩnh viễn theo trục X màn hình */
            transform: scaleX(-1);
        }

        body.hud-mode .speed-number {
            text-shadow: 0 0 25px rgba(0, 200, 255, 0.8), 0 0 50px rgba(0, 100, 255, 0.5);
            /* Giữ nguyên scaleX(-1) - đã được kế thừa */
        }

        .hud-container {
            background: #0a0f14;
            border-radius: 60px;
            padding: 30px 40px 40px 40px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.8), inset 0 0 0 1px #2f4f5f;
            transition: all 0.2s;
            max-width: 95vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .hud-toggle-btn {
            background: #1a2a33;
            border: 1px solid #3a6f8c;
            color: #b0e0ff;
            font-size: 28px;
            font-weight: bold;
            padding: 18px 40px;
            border-radius: 70px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1e26, 0 5px 20px black;
            transition: 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-family: 'Segoe UI', sans-serif;
            min-width: 250px;
        }

        .hud-toggle-btn:active {
            transform: translateY(7px);
            box-shadow: 0 1px 0 #0f1e26, 0 5px 15px black;
        }

        .hud-toggle-btn:hover {
            background: #1f3f50;
            border-color: #5fa3cc;
        }

        .gps-status {
            color: #3f8fb0;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            margin-top: 5px;
            letter-spacing: 1px;
            text-align: center;
            /* Không bị lật ngược */
            transform: none !important;
        }

        .gps-status.error {
            color: #ff7f6e;
        }
    </style>
</head>
<body>
    <div class="hud-container">
        <!-- Số tốc độ sẽ luôn bị lật ngang do transform: scaleX(-1) trong CSS -->
        <div class="speed-number" id="hudSpeed">0</div>
        
        <!-- Hiển thị trạng thái GPS (không bị lật) -->
        <div class="gps-status" id="gpsStatus">🛰 Đang khởi tạo GPS...</div>
        
        <button class="hud-toggle-btn" id="hudToggleBtn">HUD mode</button>
    </div>

    <script>
        (function() {
            const speedDisplay = document.getElementById('hudSpeed');
            const gpsStatus = document.getElementById('gpsStatus');
            const bodyEl = document.body;
            const toggleBtn = document.getElementById('hudToggleBtn');

            let currentSpeed = 0;
            let watchId = null;
            let lastPosition = null;
            let lastTimestamp = null;

            // Hàm tính tốc độ từ hai điểm GPS (m/s -> km/h)
            function calculateSpeed(position1, position2) {
                if (!position1 || !position2) return 0;
                
                const R = 6371e3; // bán kính Trái đất (mét)
                const φ1 = position1.coords.latitude * Math.PI/180;
                const φ2 = position2.coords.latitude * Math.PI/180;
                const Δφ = (position2.coords.latitude - position1.coords.latitude) * Math.PI/180;
                const Δλ = (position2.coords.longitude - position1.coords.longitude) * Math.PI/180;

                const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                        Math.cos(φ1) * Math.cos(φ2) *
                        Math.sin(Δλ/2) * Math.sin(Δλ/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distance = R * c; // khoảng cách (mét)
                
                const timeDiff = (position2.timestamp - position1.timestamp) / 1000; // giây
                if (timeDiff <= 0) return 0;
                
                const speedMps = distance / timeDiff; // m/s
                return speedMps * 3.6; // km/h
            }

            // Xử lý khi có vị trí mới
            function handlePosition(position) {
                if (lastPosition) {
                    // Tính tốc độ dựa trên 2 điểm liên tiếp
                    const speed = calculateSpeed(lastPosition, position);
                    
                    // Lọc nhiễu: tốc độ thay đổi đột ngột > 30km/h có thể do sai số GPS
                    if (Math.abs(speed - currentSpeed) < 30 || speed === 0) {
                        currentSpeed = Math.round(speed);
                    } else {
                        // Nếu nghi ngờ nhiễu, giữ tốc độ cũ
                        console.log('GPS noise filtered');
                    }
                } else {
                    // Lần đầu có vị trí, dùng speed từ GPS nếu có
                    if (position.coords.speed !== null && position.coords.speed > 0) {
                        currentSpeed = Math.round(position.coords.speed * 3.6);
                    }
                }

                // Cập nhật hiển thị
                speedDisplay.textContent = currentSpeed;
                
                // Cập nhật trạng thái
                const accuracy = position.coords.accuracy ? position.coords.accuracy.toFixed(1) : '?';
                gpsStatus.textContent = `🛰 Đã kết nối GPS (sai số ±${accuracy}m)`;
                gpsStatus.classList.remove('error');
                
                // Lưu vị trí hiện tại cho lần tính sau
                lastPosition = position;
            }

            // Xử lý lỗi GPS
            function handleError(error) {
                let message = 'Lỗi GPS: ';
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        message += 'Bạn chưa cấp quyền truy cập vị trí';
                        break;
                    case error.POSITION_UNAVAILABLE:
                        message += 'Không lấy được vị trí';
                        break;
                    case error.TIMEOUT:
                        message += 'Hết thời gian chờ GPS';
                        break;
                    default:
                        message += 'Lỗi không xác định';
                }
                gpsStatus.textContent = '⚠️ ' + message;
                gpsStatus.classList.add('error');
                speedDisplay.textContent = '0';
            }

            // Bắt đầu theo dõi GPS
            function startGPS() {
                if (!navigator.geolocation) {
                    gpsStatus.textContent = '⚠️ Trình duyệt không hỗ trợ GPS';
                    gpsStatus.classList.add('error');
                    return;
                }

                const options = {
                    enableHighAccuracy: true,  // Ưu tiên độ chính xác cao (dùng GPS)
                    maximumAge: 0,              // Không dùng cache
                    timeout: 10000               // Timeout 10 giây
                };

                watchId = navigator.geolocation.watchPosition(
                    handlePosition, 
                    handleError, 
                    options
                );

                gpsStatus.textContent = '🛰 Đang chờ tín hiệu GPS...';
            }

            // Dừng theo dõi GPS
            function stopGPS() {
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
            }

            // Bật/tắt HUD
            function toggleHudMode() {
                bodyEl.classList.toggle('hud-mode');
                toggleBtn.textContent = bodyEl.classList.contains('hud-mode') ? '⛔ HUD off' : 'HUD mode';
            }

            // Sự kiện nút
            toggleBtn.addEventListener('click', toggleHudMode);

            // Phím tắt H
            window.addEventListener('keydown', (e) => {
                if (e.key === 'h' || e.key === 'H') {
                    toggleHudMode();
                }
            });

            // Khởi động GPS khi trang load
            startGPS();

            // Dọn dẹp khi đóng trang
            window.addEventListener('beforeunload', stopGPS);

            // Double click vào số để reset bộ nhớ vị trí (nếu cần)
            speedDisplay.addEventListener('dblclick', () => {
                lastPosition = null;
                gpsStatus.textContent = '🛰 Đã reset, đang theo dõi GPS...';
            });
        })();
    </script>
</body>
</html>
